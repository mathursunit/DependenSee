name: CI

# Fast build check on every push and pull request to main. Compiles the whole
# solution on Windows (some projects target net8.0-windows). No MSI here — that
# runs in release.yml on tags.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "**/*.html"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ServiceMap.sln

      - name: Build (Release)
        run: dotnet build ServiceMap.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/ServiceMap.Tests/ServiceMap.Tests.csproj -c Release --no-restore --verbosity normal
