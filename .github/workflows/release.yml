name: Release

# Builds the self-contained app + MSI on a Windows runner and publishes the
# installer as a GitHub Release asset. Triggered by pushing a version tag
# (e.g. v1.3.0), or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "MSI version (4-part, e.g. 1.3.0.0)"
        required: false
        default: "1.3.0.0"

permissions:
  contents: write   # required to create the Release and upload assets

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $tag = $env:GITHUB_REF -replace "refs/tags/v?", ""
          } else {
            $tag = "${{ github.event.inputs.version }}"
          }
          # Normalise to a 4-part version for the MSI (e.g. 1.3.0 -> 1.3.0.0)
          $parts = $tag.Split(".")
          while ($parts.Count -lt 4) { $parts += "0" }
          $v = ($parts[0..3] -join ".")
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "MSI version = $v"

      - name: Build MSI
        shell: pwsh
        run: |
          .\installer\build-installer.ps1 -Version "${{ steps.ver.outputs.version }}"

      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist/installer -Filter "Carrier-DependenSee-*.msi" |
                 Sort-Object LastWriteTime -Descending | Select-Object -First 1
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Found $($msi.Name)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Carrier-DependenSee-msi
          path: ${{ steps.msi.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.msi.outputs.path }}
          generate_release_notes: true
